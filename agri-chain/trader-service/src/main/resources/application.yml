spring:
  application:
    name: trader-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agrichain_trader}
    username: ${DB_USER:agrichain}
    password: ${DB_PASSWORD:agrichain}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8089}

agrichain:
  encryption:
    key: ${ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}

services:
  identity:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8081}
  crop:
    url: ${CROP_SERVICE_URL:http://localhost:8083}
