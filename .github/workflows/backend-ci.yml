name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Backend Lint and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and run tests
        run: mvn clean verify

  build-push:
    name: Build & Push GHCR (${{ matrix.service }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - compliance-service
          - crop-service
          - farmer-service
          - identity-service
          - notification-service
          - reporting-service
          - subsidy-service
          - trader-service
          - transaction-service
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image prefix
        run: echo "IMAGE_PREFIX_LC=$(echo '${{ github.repository_owner }}/backend' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          build-args: MODULE_NAME=${{ matrix.service }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX_LC }}-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX_LC }}-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
