name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'agri-chain/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'agri-chain/**'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/agri-chain

jobs:
  test:
    name: Backend Lint and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./agri-chain
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Unit Tests Verification
        run: mvn clean verify

  build-push:
    name: Build & Push GHCR
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: 
          - compliance-service
          - crop-service
          - farmer-service
          - identity-service
          - notification-service
          - reporting-service
          - subsidy-service
          - trader-service
          - transaction-service
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Microservice Image
        uses: docker/build-push-action@v5
        with:
          context: ./agri-chain
          push: true
          build-args: |
             MODULE_NAME=${{ matrix.service }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}, ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
