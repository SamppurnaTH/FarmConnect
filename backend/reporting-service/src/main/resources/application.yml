spring:
  application:
    name: reporting-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agrichain_reporting}
    username: ${DB_USER:agrichain}
    password: ${DB_PASSWORD:agrichain}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8087}

agrichain:
  encryption:
    key: ${ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}

services:
  farmer:
    url: ${FARMER_SERVICE_URL:http://localhost:8082}
  crop:
    url: ${CROP_SERVICE_URL:http://localhost:8083}
  transaction:
    url: ${TRANSACTION_SERVICE_URL:http://localhost:8084}
  subsidy:
    url: ${SUBSIDY_SERVICE_URL:http://localhost:8085}
