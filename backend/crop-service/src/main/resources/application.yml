spring:
  application:
    name: crop-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agrichain_crop}
    username: ${DB_USER:agrichain}
    password: ${DB_PASSWORD:agrichain}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8083}

agrichain:
  encryption:
    key: ${ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-32chars}

services:
  farmer:
    url: ${FARMER_SERVICE_URL:http://localhost:8082}
  transaction:
    url: ${TRANSACTION_SERVICE_URL:http://localhost:8084}
  notification:
    url: ${SERVICES_NOTIFICATION_URL:http://localhost:8088}
