spring:
  application:
    name: trader-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agrichain_trader}
    username: ${DB_USER:agrichain}
    password: ${DB_PASSWORD:agrichain}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8089}

agrichain:
  encryption:
    key: ${ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-32chars}

services:
  identity:
    url: ${SERVICES_IDENTITY_URL:http://localhost:8081}
  crop:
    url: ${SERVICES_CROP_URL:http://localhost:8083}
  notification:
    url: ${SERVICES_NOTIFICATION_URL:http://localhost:8088}
