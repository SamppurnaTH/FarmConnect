spring:
  application:
    name: farmer-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agrichain_farmer}
    username: ${DB_USER:agrichain}
    password: ${DB_PASSWORD:agrichain}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8082}

agrichain:
  encryption:
    key: ${ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
