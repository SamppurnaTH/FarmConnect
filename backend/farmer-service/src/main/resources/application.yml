spring:
  application:
    name: farmer-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agrichain_farmer}
    username: ${DB_USER:agrichain}
    password: ${DB_PASSWORD:agrichain}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 11MB

server:
  port: ${SERVER_PORT:8082}

agrichain:
  encryption:
    key: ${ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-32chars}
  storage:
    base-dir: ${DOCUMENT_STORAGE_DIR:./uploads/documents}

services:
  identity:
    url: ${SERVICES_IDENTITY_URL:http://localhost:8081}
  notification:
    url: ${SERVICES_NOTIFICATION_URL:http://localhost:8088}
