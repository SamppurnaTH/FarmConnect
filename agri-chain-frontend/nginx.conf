server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Proxies configuration mirrored from Vite setup
    location ~ ^/api/(auth|roles|audit-log)(/?.*) {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://identity-service:8081;
    }
    location ~ ^/api/farmers(/?.*) {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://farmer-service:8082;
    }
    location ~ ^/api/(crops|listings|orders)(/?.*) {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://crop-service:8083;
    }
    location ~ ^/api/(transactions|payments)(/?.*) {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://transaction-service:8084;
    }
    location ~ ^/api/(subsidies|programs|disbursements)(/?.*) {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://subsidy-service:8085;
    }
    location ~ ^/api/(compliance|audits)(/?.*) {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://compliance-service:8086;
    }
    location ~ ^/api/(reports|dashboard)(/?.*) {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://reporting-service:8087;
    }
    location ~ ^/api/notifications(/?.*) {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://notification-service:8088;
    }
    location ~ ^/api/traders(/?.*) {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://trader-service:8089;
    }
    # Aggressively cache static assets (handled safely by Vite's content-hashing)
    location ~* \.(js|css|png|jpg|jpeg|svg|woff|woff2|ttf|eot)$ {
        expires max;
        log_not_found off;
        access_log off;
    }
}
