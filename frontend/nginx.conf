server {
    listen 80;
    server_name localhost;

    # Use Docker's internal DNS resolver; re-resolve every 30s
    resolver 127.0.0.11 valid=30s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Auth / roles / audit-log / users → identity-service
    location ~ ^/api/(auth|roles|audit-log|users)(/.*)?$ {
        set $upstream http://identity-service:8081;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # Farmers → farmer-service
    location ~ ^/api/farmers(/.*)?$ {
        set $upstream http://farmer-service:8082;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # Crops / listings / orders → crop-service
    location ~ ^/api/(crops|listings|orders)(/.*)?$ {
        set $upstream http://crop-service:8083;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # Transactions / payments → transaction-service
    location ~ ^/api/(transactions|payments)(/.*)?$ {
        set $upstream http://transaction-service:8084;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # Subsidies / programs / disbursements → subsidy-service
    location ~ ^/api/(subsidies|programs|disbursements)(/.*)?$ {
        set $upstream http://subsidy-service:8085;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # Compliance / audits → compliance-service
    location ~ ^/api/(compliance|compliance-records|audits)(/.*)?$ {
        set $upstream http://compliance-service:8086;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # Reports / dashboard → reporting-service
    location ~ ^/api/(reports|dashboard)(/.*)?$ {
        set $upstream http://reporting-service:8087;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # Notifications → notification-service
    location ~ ^/api/notifications(/.*)?$ {
        set $upstream http://notification-service:8088;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # Traders → trader-service
    location ~ ^/api/traders(/.*)?$ {
        set $upstream http://trader-service:8089;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # Cache static assets (safe due to Vite content-hashing)
    location ~* \.(js|css|png|jpg|jpeg|svg|woff|woff2|ttf|eot)$ {
        expires max;
        log_not_found off;
        access_log off;
    }
}
