x-common-env: &common-env
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY}

x-service-defaults: &service-defaults
  restart: on-failure
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15-alpine
    container_name: farmconnect-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrichain"]
      interval: 5s
      timeout: 5s
      retries: 10

  identity-service:
    <<: *service-defaults
    build:
      context: ./backend
      args:
        MODULE_NAME: identity-service
    container_name: farmconnect-identity
    ports:
      - "8081:8081"
    environment:
      <<: *common-env
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://postgres:5432/agrichain_identity
      JWT_SECRET: ${JWT_SECRET}

  farmer-service:
    <<: *service-defaults
    build:
      context: ./backend
      args:
        MODULE_NAME: farmer-service
    container_name: farmconnect-farmer
    ports:
      - "8082:8082"
    environment:
      <<: *common-env
      SERVER_PORT: 8082
      DB_URL: jdbc:postgresql://postgres:5432/agrichain_farmer
      JWT_SECRET: ${JWT_SECRET}
      SERVICES_IDENTITY_URL: http://identity-service:8081
      SERVICES_NOTIFICATION_URL: http://notification-service:8088
      DOCUMENT_STORAGE_DIR: /app/uploads/documents
    volumes:
      - farmer_documents:/app/uploads/documents

  crop-service:
    <<: *service-defaults
    build:
      context: ./backend
      args:
        MODULE_NAME: crop-service
    container_name: farmconnect-crop
    ports:
      - "8083:8083"
    environment:
      <<: *common-env
      SERVER_PORT: 8083
      DB_URL: jdbc:postgresql://postgres:5432/agrichain_crop
      JWT_SECRET: ${JWT_SECRET}
      SERVICES_IDENTITY_URL: http://identity-service:8081
      SERVICES_FARMER_URL: http://farmer-service:8082
      SERVICES_NOTIFICATION_URL: http://notification-service:8088

  transaction-service:
    <<: *service-defaults
    build:
      context: ./backend
      args:
        MODULE_NAME: transaction-service
    container_name: farmconnect-transaction
    ports:
      - "8084:8084"
    environment:
      <<: *common-env
      SERVER_PORT: 8084
      DB_URL: jdbc:postgresql://postgres:5432/agrichain_transaction
      JWT_SECRET: ${JWT_SECRET}
      SERVICES_IDENTITY_URL: http://identity-service:8081
      SERVICES_FARMER_URL: http://farmer-service:8082
      SERVICES_CROP_URL: http://crop-service:8083

  subsidy-service:
    <<: *service-defaults
    build:
      context: ./backend
      args:
        MODULE_NAME: subsidy-service
    container_name: farmconnect-subsidy
    ports:
      - "8085:8085"
    environment:
      <<: *common-env
      SERVER_PORT: 8085
      DB_URL: jdbc:postgresql://postgres:5432/agrichain_subsidy
      JWT_SECRET: ${JWT_SECRET}
      SERVICES_IDENTITY_URL: http://identity-service:8081
      SERVICES_FARMER_URL: http://farmer-service:8082
      SERVICES_TRANSACTION_URL: http://transaction-service:8084
      SERVICES_NOTIFICATION_URL: http://notification-service:8088

  compliance-service:
    <<: *service-defaults
    build:
      context: ./backend
      args:
        MODULE_NAME: compliance-service
    container_name: farmconnect-compliance
    ports:
      - "8086:8086"
    environment:
      <<: *common-env
      SERVER_PORT: 8086
      DB_URL: jdbc:postgresql://postgres:5432/agrichain_compliance
      SERVICES_IDENTITY_URL: http://identity-service:8081
      SERVICES_FARMER_URL: http://farmer-service:8082
      SERVICES_TRANSACTION_URL: http://transaction-service:8084
      SERVICES_SUBSIDY_URL: http://subsidy-service:8085

  reporting-service:
    <<: *service-defaults
    build:
      context: ./backend
      args:
        MODULE_NAME: reporting-service
    container_name: farmconnect-reporting
    ports:
      - "8087:8087"
    environment:
      <<: *common-env
      SERVER_PORT: 8087
      DB_URL: jdbc:postgresql://postgres:5432/agrichain_reporting
      SERVICES_IDENTITY_URL: http://identity-service:8081
      SERVICES_FARMER_URL: http://farmer-service:8082
      SERVICES_CROP_URL: http://crop-service:8083
      SERVICES_TRANSACTION_URL: http://transaction-service:8084
      SERVICES_SUBSIDY_URL: http://subsidy-service:8085
      SERVICES_COMPLIANCE_URL: http://compliance-service:8086

  notification-service:
    <<: *service-defaults
    build:
      context: ./backend
      args:
        MODULE_NAME: notification-service
    container_name: farmconnect-notification
    ports:
      - "8088:8088"
    environment:
      <<: *common-env
      SERVER_PORT: 8088
      DB_URL: jdbc:postgresql://postgres:5432/agrichain_notification
      JWT_SECRET: ${JWT_SECRET}
      SERVICES_IDENTITY_URL: http://identity-service:8081

  trader-service:
    <<: *service-defaults
    build:
      context: ./backend
      args:
        MODULE_NAME: trader-service
    container_name: farmconnect-trader
    ports:
      - "8089:8089"
    environment:
      <<: *common-env
      SERVER_PORT: 8089
      DB_URL: jdbc:postgresql://postgres:5432/agrichain_trader
      JWT_SECRET: ${JWT_SECRET}
      SERVICES_IDENTITY_URL: http://identity-service:8081
      SERVICES_CROP_URL: http://crop-service:8083
      SERVICES_NOTIFICATION_URL: http://notification-service:8088

  frontend:
    build:
      context: ./frontend
    container_name: farmconnect-frontend
    ports:
      - "80:80"
    depends_on:
      - identity-service
      - farmer-service
      - crop-service
      - transaction-service
      - subsidy-service
      - compliance-service
      - reporting-service
      - notification-service
      - trader-service

volumes:
  postgres_data:
  farmer_documents:
